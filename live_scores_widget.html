  ======================================================

  1. Go to your Blogger Dashboard > Layout.
  2. Click "Add a Gadget" in the Sidebar or Main section.

  4. Paste this ENTIRE code inside and save.
  5. If you host your backend on Render, replace 'http://localhost:3000' on line 214 with your Render URL.
-->

<!-- Include Premium Font -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<div class="yalla-scores-widget">
  <div class="widget-header">
    <div class="header-main">
      <span class="widget-icon">⚽</span>
      <h3 class="widget-title">Live Match Center</h3>
    </div>
    <span class="timezone-badge">Riyadh Time (UTC+3)</span>
  </div>
  
  <div id="yalla-widget-loader" class="widget-loader">
    <div class="loader-spinner"></div>
    <p>Loading live match scores...</p>
  </div>
  
  <div id="yalla-widget-grid" class="widget-grid" style="display: none;">
    <!-- Live matches will be injected here dynamically -->
  </div>
</div>

<style>
/* Scoped Widget Styling to prevent conflict with your existing Blogger Theme */
.yalla-scores-widget {
  font-family: 'Cairo', sans-serif;
  background: #ffffff;
  border: 1px solid rgba(0, 0, 0, 0.08);
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02), 0 1px 3px rgba(0, 0, 0, 0.01);
  margin-bottom: 20px;
  direction: ltr; /* English LTR alignment */
}

.yalla-scores-widget * {
  box-sizing: border-box;
}

.yalla-scores-widget .widget-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid #4d0b7a;
  padding-bottom: 10px;
  margin-bottom: 15px;
}

.yalla-scores-widget .header-main {
  display: flex;
  align-items: center;
  gap: 8px;
}

.yalla-scores-widget .widget-icon {
  font-size: 20px;
  animation: bounce 2s infinite;
}

.yalla-scores-widget .widget-title {
  font-size: 16px;
  font-weight: 800;
  color: #4d0b7a;
  margin: 0;
  text-transform: uppercase;
}

.yalla-scores-widget .timezone-badge {
  font-size: 11px;
  font-weight: 700;
  color: #5f667d;
  background: #f4f6fa;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid rgba(0,0,0,0.03);
}

/* Match Grid & Cards */
.yalla-scores-widget .widget-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.yalla-scores-widget .match-card {
  background: #fafbfc;
  border: 1px solid rgba(0, 0, 0, 0.05);
  border-radius: 8px;
  padding: 12px;
  transition: all 0.3s ease;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.yalla-scores-widget .match-card:hover {
  transform: translateY(-1px);
  border-color: rgba(77, 11, 122, 0.15);
  background: #ffffff;
  box-shadow: 0 4px 12px rgba(77, 11, 122, 0.04);
}

.yalla-scores-widget .match-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.yalla-scores-widget .team {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}

.yalla-scores-widget .team.home {
  justify-content: flex-start;
}

.yalla-scores-widget .team.away {
  justify-content: flex-end;
  flex-direction: row-reverse;
}

.yalla-scores-widget .team-logo {
  width: 36px;
  height: 36px;
  background: #ffffff;
  border-radius: 50%;
  padding: 2px;
  border: 1px solid rgba(0, 0, 0, 0.05);
  object-fit: contain;
}

.yalla-scores-widget .team-name {
  font-size: 13px;
  font-weight: 700;
  color: #1a1e29;
}

.yalla-scores-widget .match-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  min-width: 100px;
  padding: 0 5px;
}

.yalla-scores-widget .match-time {
  font-size: 11px;
  font-weight: 700;
  background: rgba(77, 11, 122, 0.05);
  padding: 2px 8px;
  border-radius: 4px;
  color: #4d0b7a;
  border: 1px solid rgba(77, 11, 122, 0.08);
}

.yalla-scores-widget .match-score {
  font-size: 16px;
  font-weight: 800;
  color: #1a1e29;
  letter-spacing: 1px;
}

.yalla-scores-widget .match-status {
  font-size: 10px;
  font-weight: 800;
  padding: 2px 7px;
  border-radius: 12px;
  text-transform: uppercase;
}

.yalla-scores-widget .match-status.not-started {
  background: rgba(0, 180, 216, 0.06);
  color: #0077b6;
  border: 1px solid rgba(0, 180, 216, 0.15);
}

.yalla-scores-widget .match-status.live {
  background: rgba(183, 28, 28, 0.06);
  color: #b71c1c;
  border: 1px solid rgba(183, 28, 28, 0.15);
  animation: widget-blink 1.2s infinite;
}

.yalla-scores-widget .match-status.ended {
  background: #f1f3f7;
  color: #5f667d;
  border: 1px solid rgba(0, 0, 0, 0.05);
}

/* Match Footer Info */
.yalla-scores-widget .match-meta {
  border-top: 1px solid rgba(0, 0, 0, 0.03);
  padding-top: 6px;
  display: flex;
  justify-content: space-around;
  font-size: 11px;
  color: #5f667d;
  background: #f8fafc;
  border-radius: 4px;
  font-weight: 600;
}

.yalla-scores-widget .meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Loader & Status Styles */
.yalla-scores-widget .widget-loader {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 10px;
  color: #5f667d;
  font-size: 12px;
  font-weight: 600;
  gap: 10px;
}

.yalla-scores-widget .loader-spinner {
  width: 28px;
  height: 28px;
  border: 3px solid rgba(77, 11, 122, 0.1);
  border-top-color: #4d0b7a;
  border-radius: 50%;
  animation: widget-spin 1s linear infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

@keyframes widget-spin {
  to { transform: rotate(360deg); }
}

@keyframes widget-blink {
  50% { opacity: 0.6; }
}
</style>

<script type="text/javascript">
(function() {
  // CONFIGURATION: Replace this URL with your live public Render URL when hosted!
  const FEED_CENTER_URL = 'http://localhost:3000';

  async function fetchLiveScores() {
    const grid = document.getElementById('yalla-widget-grid');
    const loader = document.getElementById('yalla-widget-loader');
    if (!grid || !loader) return;

    try {
      const res = await fetch(`${FEED_CENTER_URL}/api/data`);
      const json = await res.json();
      
      if (json.success && json.data.matches && json.data.matches.length > 0) {
        let html = '';
        json.data.matches.forEach(m => {
          const statusClass = m.statusClass === 'live' ? 'live' : (m.statusClass === 'finished' ? 'ended' : 'not-started');
          let statusText = 'Not Started';
          if (m.statusClass === 'live') statusText = 'LIVE 📡';
          if (m.statusClass === 'finished') statusText = 'Ended';
          if (m.statusText && m.statusText !== 'لم تبدأ بعد' && m.statusText !== 'انتهت' && m.statusText !== 'not-started') {
            statusText = m.statusText;
          }

          // English fallback translations
          if (statusText === 'لم تبدأ بعد') statusText = 'Not Started';
          if (statusText === 'انتهت') statusText = 'Ended';

          html += `
            <div class="match-card" onclick="window.open('${m.link}', '_blank')">
              <div class="match-inner">
                <div class="team home">
                  <img class="team-logo" src="${m.team1.logo || 'https://www.tv-yalla.live/wp-content/uploads/2026/05/cropped-لنثصلث-32x32.png'}" alt="${m.team1.name}"/>
                  <span class="team-name">${m.team1.name}</span>
                </div>
                <div class="match-center">
                  <span class="match-time">${m.time}</span>
                  <span class="match-score">${m.score}</span>
                  <span class="match-status ${statusClass}">${statusText}</span>
                </div>
                <div class="team away">
                  <img class="team-logo" src="${m.team2.logo || 'https://www.tv-yalla.live/wp-content/uploads/2026/05/cropped-لنثصلث-32x32.png'}" alt="${m.team2.name}"/>
                  <span class="team-name">${m.team2.name}</span>
                </div>
              </div>
              <div class="match-meta">
                <span class="meta-item">📺 ${m.channel}</span>
                <span class="meta-item">🎤 ${m.commentator}</span>
                <span class="meta-item">🏆 ${m.tournament}</span>
              </div>
            </div>
          `;
        });
        grid.innerHTML = html;
        loader.style.display = 'none';
        grid.style.display = 'grid';
      } else {
        showFallbackError("No live matches scheduled for today.");
      }
    } catch (err) {
      console.log("Feed Center offline or blocked by CORS. Using fallback matches.");
      showFallbackError("Feed Center Offline. Please start your local server or deploy to Render.");
    }
  }

  function showFallbackError(message) {
    const loader = document.getElementById('yalla-widget-loader');
    if (loader) {
      loader.innerHTML = `
        <div style="font-size:24px;">⚽</div>
        <p style="color:#b71c1c; font-weight:700;">${message}</p>
        <p style="font-size:11px; color:#5f667d; margin-top:-5px;">Make sure your scraper server is running.</p>
      `;
    }
  }

  // Run dynamic fetch on load
  window.addEventListener('load', fetchLiveScores);
})();
</script>
